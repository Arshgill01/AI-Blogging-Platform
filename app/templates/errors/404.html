{% extends "base.html" %}

{% block title %}Page Not Found | WaveBlog AI{% endblock %}

{% block content %}
  <section class="card border-0 shadow-sm mx-auto" style="max-width: 760px;">
    <div class="card-body p-4 p-md-5 text-center">
      <p class="text-uppercase text-muted fw-semibold small mb-2">Broken route</p>
      <h1 class="display-6 fw-bold mb-3">That page does not exist.</h1>
      <p class="text-muted mb-4">
        The link may be outdated, or the page may have moved. Use one of the stable demo paths below.
      </p>
      <div class="d-flex justify-content-center gap-2 flex-wrap">
        <a class="btn btn-primary px-4" href="{{ url_for('main.home') }}">Home</a>
        <a class="btn btn-outline-secondary px-4" href="{{ url_for('posts.create') }}">Author Studio</a>
        <a class="btn btn-outline-secondary px-4" href="{{ url_for('analytics.dashboard') }}">Dashboard</a>
      </div>
    </div>
  </section>
{% endblock %}
