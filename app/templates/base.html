<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}AI Blogging Platform{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
  </head>
  <body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
      <div class="container">
        <a class="navbar-brand fw-semibold" href="{{ url_for('main.home') }}">AI Blogging Platform</a>
        <div class="navbar-nav ms-auto">
          <a class="nav-link" href="{{ url_for('main.home') }}">Home</a>
          <a class="nav-link" href="{{ url_for('posts.create') }}">New Post</a>
          <a class="nav-link" href="{{ url_for('analytics.dashboard') }}">Analytics</a>
        </div>
      </div>
    </nav>

    <main class="py-5">
      <div class="container">
        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            <div class="mb-4">
              {% for category, message in messages %}
                <div class="alert alert-{{ category }} mb-2" role="alert">{{ message }}</div>
              {% endfor %}
            </div>
          {% endif %}
        {% endwith %}

        {% block content %}{% endblock %}
      </div>
    </main>
  </body>
</html>
